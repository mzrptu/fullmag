name: bootstrap

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  rust-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Run Rust contract tests
        run: cargo test -p fullmag-ir -p fullmag-plan -p fullmag-authoring

  web-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck web app
        run: pnpm --dir apps/web typecheck

      - name: Build web app
        run: pnpm --dir apps/web build

  python-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: packages/fullmag-py/pyproject.toml

      - name: Install Python package
        run: python -m pip install -e 'packages/fullmag-py[meshing]'

      - name: Run Python API tests
        run: python -m unittest discover -s packages/fullmag-py/tests -p 'test_api.py' -v

      - name: Run Python meshing tests
        run: python -m unittest discover -s packages/fullmag-py/tests -p 'test_meshing.py' -v

      - name: Repository consistency checks
        run: python scripts/check_repo_consistency.py
