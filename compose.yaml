services:
  dev:
    build:
      context: .
      dockerfile: docker/dev/Dockerfile
    image: fullmag/dev:local
    working_dir: /workspace
    command: sleep infinity
    volumes:
      - ./:/workspace
      - cargo-cache:/usr/local/cargo/registry
      - target-cache:/workspace/target
      - pnpm-store:/pnpm/store
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      POSTGRES_URL: postgres://fullmag:${POSTGRES_PASSWORD}@postgres:5432/fullmag
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      NATS_URL: nats://nats:4222
    depends_on:
      - postgres
      - minio
      - nats

  fem-gpu:
    build:
      context: .
      dockerfile: docker/fem-gpu/Dockerfile
    image: fullmag/fem-gpu:local
    working_dir: /workspace
    command: sleep infinity
    volumes:
      - ./:/workspace
      - cargo-cache:/usr/local/cargo/registry
      - target-cache:/workspace/target
      - pnpm-store:/pnpm/store
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      FULLMAG_USE_MFEM_STACK: "ON"
      CMAKE_PREFIX_PATH: /opt/fullmag-deps
      LD_LIBRARY_PATH: /opt/fullmag-deps/lib
    gpus: all
    profiles:
      - gpu
      - fem
      - fem-gpu

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: fullmag
      POSTGRES_USER: fullmag
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  nats:
    image: nats:2.11-alpine
    ports:
      - "4222:4222"
      - "8222:8222"

volumes:
  cargo-cache:
  target-cache:
  pnpm-store:
  postgres-data:
  minio-data:
